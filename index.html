<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="CU Circle"/>
<meta name="theme-color" content="#7C3AED"/>
<title>CU Circle – Chitkara University</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#7C3AED;--purple-dark:#5B21B6;--purple-lt:#A78BFA;
  --purple-pale:#EDE9FF;--purple-bg:#F5F3FF;--lavender:#DDD6FE;
  --pink:#F472B6;--pink-pale:#FCE7F3;--white:#FFFFFF;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;
  --gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;
  --green:#10B981;--green-pale:#D1FAE5;--red:#EF4444;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--purple-bg);}
#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--white);overflow:hidden;max-width:430px;margin:0 auto;position:relative;}
@media(min-width:500px){
  body{display:flex;align-items:flex-start;justify-content:center;padding:24px 0 40px;overflow-y:auto;min-height:100vh;}
  #app{border-radius:44px;min-height:852px;box-shadow:0 40px 100px rgba(124,58,237,0.28),0 0 0 10px rgba(124,58,237,0.07);height:auto;}
}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .32s ease;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes typingPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

#bottom-nav{display:flex;border-top:1.5px solid var(--gray-100);background:var(--white);padding:8px 0 calc(14px + var(--safe-bottom));flex-shrink:0;z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--gray-400);font-family:'Nunito',sans-serif;font-size:10px;font-weight:600;position:relative;padding:4px 0;}
.nav-btn.active{color:var(--purple);font-weight:900;}
.nav-btn svg{width:22px;height:22px;}
.nav-dot{position:absolute;top:0;right:22%;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--white);}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--purple);color:var(--white);border:none;border-radius:30px;padding:15px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.2px;box-shadow:0 6px 20px rgba(124,58,237,.38);transition:transform .12s,opacity .12s;width:100%;}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{background:var(--gray-300);box-shadow:none;cursor:not-allowed;}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--white);color:var(--purple);border:2px solid var(--purple);border-radius:30px;padding:13px 28px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;width:100%;}
.btn-outline:active{transform:scale(.97);}
.btn-sm{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--purple);color:var(--white);border:none;border-radius:22px;padding:8px 16px;font-size:12.5px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(124,58,237,.32);transition:transform .12s;white-space:nowrap;flex-shrink:0;}
.btn-sm:active{transform:scale(.96);}
.btn-sm.joined{background:var(--purple-pale);color:var(--purple);box-shadow:none;}
.btn-sm.outline{background:transparent;color:var(--purple);border:1.5px solid var(--purple);box-shadow:none;}
.btn-ghost{border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;}

.input-group{margin-bottom:18px;}
.input-label{display:block;font-size:11px;font-weight:800;color:var(--gray-500);margin-bottom:7px;letter-spacing:.6px;text-transform:uppercase;}
.input-field{width:100%;padding:14px 16px;border-radius:14px;border:2px solid var(--gray-200);font-size:15px;font-weight:600;font-family:'Nunito',sans-serif;outline:none;color:var(--gray-800);background:var(--white);transition:border .2s;}
.input-field:focus{border-color:var(--purple);}
.input-field.valid{border-color:var(--green);}
.input-field.error{border-color:var(--red);}
.input-hint{font-size:12px;margin-top:5px;font-weight:600;}
.input-hint.ok{color:var(--green);}
.input-hint.err{color:var(--red);}

.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid var(--lavender);background:var(--purple-pale);color:var(--purple);white-space:nowrap;}
.tag.active{background:var(--purple);color:var(--white);border-color:var(--purple);}
.tag.sm{font-size:10px;padding:2px 8px;}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--white);flex-shrink:0;letter-spacing:-.5px;overflow:hidden;}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px;}
.pdot{height:8px;border-radius:4px;background:var(--lavender);transition:all .3s;}
.pdot.active{background:var(--purple);}

.card{border:1.5px solid var(--gray-100);border-radius:18px;padding:14px 16px;background:var(--white);}
.circle-icon{border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--white);border-radius:26px 26px 0 0;padding:22px 22px calc(32px + var(--safe-bottom));width:100%;max-height:90%;overflow-y:auto;animation:slideUp .35s cubic-bezier(.32,.72,0,1) both;}
.modal-full{position:absolute;inset:0;background:var(--white);z-index:200;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .25s ease;}

.bubble-mine{background:var(--purple);color:var(--white);border-radius:20px 20px 4px 20px;padding:11px 16px;max-width:230px;font-size:14px;font-weight:600;line-height:1.45;}
.bubble-other{background:var(--gray-100);color:var(--gray-800);border-radius:20px 20px 20px 4px;padding:11px 16px;max-width:230px;font-size:14px;font-weight:600;line-height:1.45;}
.bubble-system{background:var(--purple-pale);color:var(--purple);border-radius:14px;padding:12px 16px;font-size:13px;font-weight:700;line-height:1.4;text-align:center;}

.interest-tile{border-radius:16px;border:2px solid var(--gray-200);background:var(--white);padding:16px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;transition:all .15s;font-family:'Nunito',sans-serif;width:100%;}
.interest-tile.sel{border-color:var(--purple);background:var(--purple-pale);transform:scale(1.03);box-shadow:0 4px 14px rgba(124,58,237,.2);}
.interest-tile .check{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;}

.section-title{font-size:13px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;}
.divider{height:1px;background:var(--gray-100);margin:0;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:14px;border:2px solid transparent;background:var(--white);cursor:pointer;flex-shrink:0;min-width:56px;transition:all .15s;font-family:'Nunito',sans-serif;}
.mood-btn.sel{background:var(--purple);border-color:var(--purple);}
.gradient-card{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-lt) 100%);border-radius:22px;padding:20px 22px;position:relative;overflow:hidden;}

.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-400);display:inline-block;animation:typingPulse 1.4s infinite ease-in-out;}
.typing-dot:nth-child(1){animation-delay:0s;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}

.ai-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

.bubble-img{max-width:200px;border-radius:14px;overflow:hidden;cursor:pointer;}
.bubble-img img{width:100%;display:block;border-radius:14px;}

.help-bubble{background:linear-gradient(135deg,var(--purple),var(--purple-lt));color:white;border-radius:18px 18px 18px 4px;padding:12px 16px;font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:8px;max-width:280px;}
.help-user-bubble{background:var(--gray-100);color:var(--gray-800);border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:8px;max-width:280px;align-self:flex-end;}

.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.profile-pic-ring{position:relative;display:inline-block;}
.profile-pic-badge{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--purple);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;cursor:pointer;}

body.dark{background:#0f0d1a;}
body.dark #app{background:#1a1625;}
body.dark .screen{background:#1a1625;}
body.dark #bottom-nav{background:#1a1625;border-color:#2d2640;}
body.dark .card{background:#231e30;border-color:#2d2640;}
body.dark .input-field{background:#231e30;border-color:#2d2640;color:#e2dff0;}
body.dark .bubble-other{background:#2d2640;color:#e2dff0;}
body.dark .bubble-system{background:#2d2640;color:var(--purple-lt);}
body.dark .modal-full{background:#1a1625;}
body.dark .modal-sheet{background:#1a1625;}
body.dark .help-user-bubble{background:#2d2640;color:#e2dff0;}
body.dark .overlay{background:rgba(0,0,0,.7);}
body.dark .mood-btn{background:#231e30;}
body.dark .interest-tile{background:#231e30;border-color:#2d2640;color:#e2dff0;}
body.dark .tag{background:#2d2640;border-color:#3d3560;color:var(--purple-lt);}

.confession-card{background:linear-gradient(135deg,#231e30,#1a1625);border:1.5px solid var(--lavender);border-radius:18px;padding:16px;margin-bottom:12px;position:relative;}
body:not(.dark) .confession-card{background:linear-gradient(135deg,var(--purple-pale),var(--pink-pale));}
.confession-card .conf-text{font-size:14px;font-weight:600;color:var(--gray-700);line-height:1.5;font-style:italic;margin-bottom:10px;}
body.dark .confession-card .conf-text{color:#e2dff0;}
.confession-card .conf-meta{font-size:11px;color:var(--gray-400);font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.conf-react-btn{border:none;background:var(--purple-pale);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:transform .1s;}
.conf-react-btn:active{transform:scale(.93);}
body.dark .conf-react-btn{background:#2d2640;}

.compat-meter{height:6px;border-radius:3px;background:var(--gray-200);overflow:hidden;}
.compat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .8s ease;}

.toggle-track{width:44px;height:24px;border-radius:12px;background:var(--gray-300);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-track.on{background:var(--purple);}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.toggle-track.on .toggle-thumb{transform:translateX(20px);}

/* ── JOURNAL SCREEN ─────────────────────────────────────────────────────── */
@keyframes journalFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes badgePop{0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
.journal-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0e0c14;}
.journal-hero{position:relative;width:100%;height:340px;flex-shrink:0;overflow:hidden;}
.journal-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.journal-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,12,20,0.1) 0%,rgba(14,12,20,0.7) 75%,rgba(14,12,20,1) 100%);}
.journal-body{flex:1;overflow-y:auto;padding:0 22px 40px;background:#0e0c14;}
.journal-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#c9a227,#f0c040);color:#0e0c14;font-size:10px;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase;animation:badgePop .5s ease .2s both;}
.journal-title{font-size:30px;font-weight:900;color:#fff;line-height:1.1;margin:10px 0 4px;letter-spacing:-.5px;}
.journal-title span{background:linear-gradient(135deg,#c9a227,#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.journal-subtitle{font-size:13px;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:18px;line-height:1.5;}
.journal-price-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.journal-price{font-size:34px;font-weight:900;color:#c9a227;letter-spacing:-.5px;}
.journal-price-original{font-size:16px;color:rgba(255,255,255,.3);text-decoration:line-through;font-weight:700;}
.journal-price-save{background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.3);color:#c9a227;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.journal-features{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;margin-bottom:20px;}
.journal-feature-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.journal-feature-item:last-child{border-bottom:none;padding-bottom:0;}
.journal-feature-icon{width:34px;height:34px;border-radius:10px;background:rgba(201,162,39,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.journal-feature-text{font-size:13px;color:rgba(255,255,255,.75);font-weight:700;}
.journal-feature-text span{display:block;font-size:11px;color:rgba(255,255,255,.4);font-weight:600;margin-top:1px;}
.journal-buy-btn{width:100%;padding:17px;border-radius:16px;border:none;background:linear-gradient(135deg,#c9a227,#f0c040);color:#0e0c14;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.3px;box-shadow:0 8px 28px rgba(201,162,39,.4);transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;gap:10px;}
.journal-buy-btn:active{transform:scale(.97);box-shadow:0 4px 14px rgba(201,162,39,.3);}
.journal-guarantee{text-align:center;font-size:11px;color:rgba(255,255,255,.3);font-weight:600;margin-top:10px;}

/* ── GAME SCREEN ──────────────────────────────────────────────────────────── */
@keyframes gamePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
@keyframes gameGlow{0%,100%{text-shadow:0 0 20px rgba(239,68,68,.6),0 0 40px rgba(239,68,68,.2)}50%{text-shadow:0 0 30px rgba(239,68,68,.9),0 0 60px rgba(239,68,68,.4)}}
@keyframes playBtnPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.game-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#080510;}
.game-hero{position:relative;width:100%;height:300px;flex-shrink:0;overflow:hidden;}
.game-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.game-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,5,16,0.2) 0%,rgba(8,5,16,0.65) 65%,rgba(8,5,16,1) 100%);}
.game-hero-badge{position:absolute;top:16px;right:16px;background:rgba(239,68,68,.9);color:white;font-size:10px;font-weight:900;padding:5px 12px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase;animation:gamePulse 2s infinite;}
.game-body{flex:1;overflow-y:auto;padding:0 22px 40px;background:#080510;}
.game-genre-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.game-genre-tag{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;border:1px solid;letter-spacing:.5px;}
.game-title{font-size:36px;font-weight:900;color:#fff;line-height:1;margin-bottom:4px;animation:gameGlow 3s ease-in-out infinite;}
.game-title span{color:#ef4444;}
.game-subtitle{font-size:13px;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:18px;line-height:1.5;}
.game-stats-row{display:flex;gap:12px;margin-bottom:20px;}
.game-stat{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center;}
.game-stat-val{font-size:18px;font-weight:900;color:#fff;margin-bottom:2px;}
.game-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.game-desc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;margin-bottom:20px;}
.game-desc p{font-size:13.5px;color:rgba(255,255,255,.7);font-weight:600;line-height:1.6;}
.game-play-btn{width:100%;padding:18px;border-radius:16px;border:none;background:linear-gradient(135deg,#ef4444,#b91c1c);color:white;font-size:17px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.3px;box-shadow:0 8px 28px rgba(239,68,68,.45);transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;gap:10px;animation:playBtnPulse 2s ease-in-out infinite;}
.game-play-btn:active{transform:scale(.97);box-shadow:0 4px 14px rgba(239,68,68,.3);}
.game-warning{text-align:center;font-size:11px;color:rgba(255,255,255,.3);font-weight:600;margin-top:10px;}

/* ── COMMUNITY ACTIVITIES SCREEN ─────────────────────────────────────────── */
@keyframes carouselSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.community-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0814;}
.community-slide{animation:carouselSlide .3s ease;}
.community-poster{width:100%;height:220px;object-fit:cover;border-radius:20px;display:block;margin-bottom:16px;}
.community-poster-placeholder{width:100%;height:220px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.community-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;margin-bottom:10px;}
.community-cta-btn{width:100%;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .12s,opacity .12s;}
.community-cta-btn:active{transform:scale(.97);}
.carousel-dots{display:flex;gap:8px;justify-content:center;margin:14px 0 4px;}
.carousel-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.25);transition:all .3s;cursor:pointer;}
.carousel-dot.active{background:white;width:22px;}
.carousel-nav{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px;}
.carousel-arrow{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.carousel-arrow:active{background:rgba(255,255,255,.2);}
.carousel-arrow:disabled{opacity:.3;cursor:not-allowed;}

/* ── WATCH MOVIE SCREEN ───────────────────────────────────────────────────── */
@keyframes movieGlow{0%,100%{box-shadow:0 0 30px rgba(239,68,68,.3)}50%{box-shadow:0 0 60px rgba(239,68,68,.5)}}
.movie-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#06040d;}
.movie-poster-wrap{padding:24px 28px 16px;display:flex;justify-content:center;}

const GROQ_MODEL = 'llama-3.3-70b-versatile';

async function callGroq(messages, systemPrompt, maxTokens=200) {
  const res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
    body: JSON.stringify({ model: GROQ_MODEL, max_tokens: maxTokens, temperature: 0.85, messages: [{ role: 'system', content: systemPrompt }, ...messages] })
  });
  if (!res.ok) { const e = await res.text(); console.error('[AI]', res.status, e); throw new Error(`API ${res.status}`); }
  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content?.trim();
  if (!reply) throw new Error('Empty response');
  return reply;
}

function avatarBg(name=''){
  const h=(name.charCodeAt(0)||0)*37+((name.charCodeAt(1)||0)*13);
  return `hsl(${h%360},50%,62%)`;
}
function avatarInitials(name=''){return name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function nowTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(e.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){e.className=v;}
    else if(k==='html'){e.innerHTML=v;}
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}

function icon(path,size=22,color='var(--purple)'){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.style.flexShrink='0';
  svg.innerHTML=path.replace(/COLOR/g,color);
  return svg;
}

function mkAvatar(name, size=42, extraStyle='', pic=null){
  const bg=avatarBg(name); const fs=Math.round(size*.38);
  if(pic){
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;${extraStyle}"><img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/></div>`;
  }
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;${extraStyle}">${avatarInitials(name)}</div>`;
}

  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'20px'}});
  INTERESTS.forEach(({e,l})=>{

      tile.innerHTML=`${tempInterests.includes(l)?'<div class="check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">'+ICONS.check.replace(/COLOR/g,'white')+'</svg></div>':''}<span style="font-size:24px;">${e}</span><span style="font-size:11px;font-weight:800;color:${tempInterests.includes(l)?'var(--purple)':'var(--gray-700)'};">${l}</span>`;
      const cnt=document.getElementById('sel-count');if(cnt)cnt.textContent=tempInterests.length===0?'Pick at least 3':tempInterests.length+' selected ✓';
      const sbtn=document.getElementById('save-interests');if(sbtn)sbtn.disabled=tempInterests.length<3;
    }});
    tile.innerHTML=`${isSel?'<div class="check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">'+ICONS.check.replace(/COLOR/g,'white')+'</svg></div>':''}<span style="font-size:24px;">${e}</span><span style="font-size:11px;font-weight:800;color:${isSel?'var(--purple)':'var(--gray-700)'};">${l}</span>`;
    grid.appendChild(tile);
  });
  scroll.appendChild(grid);
  const saveBtn=el('button',{className:'btn-primary',id:'save-interests',onClick:()=>{
    if(tempInterests.length<3){alert('Please select at least 3 interests!');return;}

function buildMain(content){
  const mainWrap=el('div',{style:{flex:'1',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}});

  if(STATE.showCommunityActivities){mainWrap.appendChild(buildCommunityActivitiesScreen());content.appendChild(mainWrap);return;}
  if(STATE.showWatchMovie){mainWrap.appendChild(buildWatchMovieScreen());content.appendChild(mainWrap);return;}
  if(STATE.showJournal){mainWrap.appendChild(buildJournalScreen());content.appendChild(mainWrap);return;}
  if(STATE.showGame){mainWrap.appendChild(buildGameScreen());content.appendChild(mainWrap);return;}
  if(STATE.chatTarget){mainWrap.appendChild(buildChat());content.appendChild(mainWrap);return;}
  if(STATE.viewProfile){mainWrap.appendChild(buildProfileView());content.appendChild(mainWrap);return;}
  if(STATE.helpOpen){mainWrap.appendChild(buildHelpScreen());content.appendChild(mainWrap);return;}
  if(STATE.showRealChat){mainWrap.appendChild(buildRealChat());content.appendChild(mainWrap);return;}
  if(STATE.showCreate){
    mainWrap.appendChild(buildTabContent());
    mainWrap.appendChild(buildCreateModal());
    mainWrap.appendChild(buildBottomNav());
    content.appendChild(mainWrap);return;
  }
  mainWrap.appendChild(buildTabContent());
  mainWrap.appendChild(buildBottomNav());
  const fab=el('button',{style:{position:'absolute',bottom:'80px',right:'18px',width:'50px',height:'50px',borderRadius:'50%',background:'linear-gradient(135deg,var(--purple),var(--purple-lt))',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 20px rgba(124,58,237,.4)',zIndex:'100'},onClick:()=>{STATE.helpOpen=true;render();}});
  fab.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none">${ICONS.sparkle.replace(/COLOR/g,'white')}</svg>`;
  mainWrap.appendChild(fab);
  if(STATE.showMenu){mainWrap.appendChild(buildMenuPanel());}
  if(STATE.showNotifs){mainWrap.appendChild(buildNotifsPanel());}
  content.appendChild(mainWrap);
}

function buildBottomNav(){
  const nav=el('div',{id:'bottom-nav'});
  const tabs=[{id:'home',ic:'home',l:'Home'},{id:'circles',ic:'circles',l:'Circles'},{id:'connect',ic:'connect',l:'Connect'},{id:'messages',ic:'msg',l:'Messages'},{id:'profile',ic:'profile',l:'Profile'}];
  tabs.forEach(t=>{
    const active=STATE.activeTab===t.id;
    const btn=el('button',{className:'nav-btn'+(active?' active':''),onClick:()=>{STATE.activeTab=t.id;STATE.chatTarget=null;STATE.viewProfile=null;STATE.helpOpen=false;render();}});
    btn.innerHTML+=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none">${ICONS[t.ic].replace(/COLOR/g,active?'var(--purple)':'var(--gray-400)')}</svg><span>${t.l}</span>`;
    nav.appendChild(btn);
  });
  return nav;
}

function buildTabContent(){
  const wrap=el('div',{className:'screen'});
  if(STATE.activeTab==='home')     wrap.appendChild(buildHome());
  if(STATE.activeTab==='circles')  wrap.appendChild(buildCircles());
  if(STATE.activeTab==='connect')  wrap.appendChild(buildConnect());
  if(STATE.activeTab==='messages') wrap.appendChild(buildMessages());
  if(STATE.activeTab==='profile')  wrap.appendChild(buildProfile());
  return wrap;
}

  const moodRow=el('div',{style:{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'2px'}});
  const tipBox=el('div',{style:{marginTop:'0',maxHeight:'0',overflow:'hidden',transition:'all .3s'}});

    } else if(STATE.moodAIResponse){

    } else {

      if(STATE.selectedMood!==null){

        tipBox.innerHTML=`<div style="padding:8px 12px;background:white;border-radius:12px;border-left:3px solid var(--purple);font-size:12px;color:var(--gray-700);font-weight:600;line-height:1.4;">${MOODS[STATE.selectedMood].tip}</div>`;

  scroll.appendChild(banner);

  const cHeader=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}});
  cHeader.innerHTML=`<p style="font-size:16px;font-weight:900;color:var(--gray-800);">Circles happening now</p><button class="btn-ghost" style="color:var(--purple);font-weight:800;font-size:13px;" onclick="STATE.activeTab='circles';render()">See all</button>`;
  scroll.appendChild(cHeader);
  CIRCLES.slice(0,3).forEach(c=>scroll.appendChild(buildCircleCard(c)));

  const confHead=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',marginTop:'22px'}});

  const confBtn=el('button',{className:'btn-sm',style:{fontSize:'11px'},onClick:()=>{STATE.confessionInput=true;render();}});
  confBtn.textContent='+ Confess';confHead.appendChild(confBtn);
  scroll.appendChild(confHead);
  if(STATE.confessionInput){
    const confBox=el('div',{className:'card',style:{marginBottom:'12px',padding:'14px'}});
    const confInp=el('textarea',{placeholder:'Share what\'s on your mind... (anonymous & AI-moderated)',style:{width:'100%',minHeight:'70px',border:'1.5px solid var(--gray-200)',borderRadius:'12px',padding:'12px',fontSize:'13px',fontFamily:'Nunito',fontWeight:'600',resize:'none',outline:'none',background:'var(--gray-50)',color:'var(--gray-800)'}});
    confBox.appendChild(confInp);
    const confActions=el('div',{style:{display:'flex',gap:'8px',marginTop:'10px',justifyContent:'flex-end'}});
    const cancelBtn=el('button',{className:'btn-sm outline',onClick:()=>{STATE.confessionInput=false;render();}});
    cancelBtn.textContent='Cancel';
    const postBtn=el('button',{className:'btn-sm',onClick:async()=>{
      const txt=confInp.value.trim();if(!txt||txt.length<10){alert('Write at least 10 characters');return;}
      postBtn.innerHTML='<span class="ai-spinner"></span> Checking...';
      try{
        const mod=await moderateConfession(txt);
        if(mod.startsWith('SAFE')){STATE.confessions.unshift({id:'cf'+Date.now(),text:txt,likes:0,time:'Just now',reacted:false});STATE.confessionInput=false;}
        else{alert('⚠️ AI Moderation: '+mod.replace('UNSAFE:','').trim()+'\n\nPlease revise your confession.');}

function buildCircleCard(c){
  const card=el('div',{className:'card',style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}});
  const joined=STATE.joinedCircles.includes(c.id);
  card.innerHTML=`<div class="circle-icon" style="width:48px;height:48px;background:${c.bg};">${c.e}</div><div style="flex:1;min-width:0;"><p style="font-weight:900;font-size:14px;color:var(--gray-800);margin-bottom:2px;">${c.n}</p><p style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">${c.desc}</p><div style="display:flex;align-items:center;gap:4px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">${ICONS.users.replace(/COLOR/g,'var(--gray-400)')}</svg><span style="font-size:11px;color:var(--gray-400);">${c.m+(joined?1:0)} joined</span></div></div>`;
  const btn=el('button',{className:'btn-sm'+(joined?' joined':''),onClick:()=>{if(joined){STATE.joinedCircles=STATE.joinedCircles.filter(x=>x!==c.id);}else{STATE.joinedCircles.push(c.id);}render();}});
  btn.textContent=joined?'Joined ✓':'Join';card.appendChild(btn);return card;
}

let circlesTab=0;
function buildCircles(){
  const wrap=el('div',{style:{display:'flex',flexDirection:'column',flex:'1',overflow:'hidden'}});
  const head=el('div',{style:{padding:'22px 20px 0',flexShrink:'0'}});
  head.innerHTML=`<p style="font-size:22px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">Open Circles</p><p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">Find your people, one circle at a time</p>`;
  const tabRow=el('div',{style:{display:'flex',gap:'8px',marginBottom:'14px',overflowX:'auto',paddingBottom:'2px'}});
  ['For You','New','Nearby','All'].forEach((t,i)=>{
    const b=el('button',{style:{padding:'8px 18px',borderRadius:'22px',border:'none',background:circlesTab===i?'var(--purple)':'var(--purple-pale)',color:circlesTab===i?'white':'var(--purple)',fontWeight:'800',fontSize:'13px',cursor:'pointer',fontFamily:'Nunito',flexShrink:'0',boxShadow:circlesTab===i?'0 4px 12px rgba(124,58,237,.3)':'none'},onClick:()=>{circlesTab=i;render();}});
    b.textContent=t;tabRow.appendChild(b);
  });
  head.appendChild(tabRow);wrap.appendChild(head);
  const getList=()=>{
    if(circlesTab===0){const uk=STATE.user.interests.map(x=>x.toLowerCase());const m=CIRCLES.filter(c=>(c.keywords||[]).some(k=>uk.includes(k)));return m.length>0?m:CIRCLES.slice(0,4);}
    if(circlesTab===1)return [...CIRCLES].reverse();
    if(circlesTab===2)return CIRCLES.filter((_,i)=>i%2===0);
    return CIRCLES;
  };
  const scroll=el('div',{className:'scroll',style:{padding:'0 20px 100px'}});
  getList().forEach(c=>{
    const joined=STATE.joinedCircles.includes(c.id);
    const row=el('div',{style:{display:'flex',alignItems:'flex-start',gap:'12px',padding:'14px 0',borderBottom:'1px solid var(--gray-100)'}});
    row.innerHTML=`<div class="circle-icon" style="width:52px;height:52px;background:${c.bg};">${c.e}</div><div style="flex:1;min-width:0;"><p style="font-weight:900;font-size:14px;color:var(--gray-800);margin-bottom:2px;">${c.n}</p><p style="font-size:12px;color:var(--gray-500);margin-bottom:6px;line-height:1.4;">${c.desc}</p><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">${c.tags.map(t=>`<span class="tag sm">${t}</span>`).join('')}</div><div style="display:flex;align-items:center;gap:4px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">${ICONS.users.replace(/COLOR/g,'var(--gray-400)')}</svg><span style="font-size:11px;color:var(--gray-400);">${c.m+(joined?1:0)} joined</span></div></div>`;
    const bw=el('div',{style:{display:'flex',flexDirection:'column',gap:'6px',alignItems:'flex-end'}});
    const jb=el('button',{className:'btn-sm'+(joined?' joined':''),onClick:()=>{if(joined){STATE.joinedCircles=STATE.joinedCircles.filter(x=>x!==c.id);}else{STATE.joinedCircles.push(c.id);}render();}});
    jb.textContent=joined?'Joined ✓':'Join';bw.appendChild(jb);
    if(joined){const cb=el('button',{className:'btn-sm outline',onClick:()=>{STATE.chatTarget=c;render();}});cb.textContent='💬 Chat';bw.appendChild(cb);}
    row.appendChild(bw);scroll.appendChild(row);
  });
  wrap.appendChild(scroll);return wrap;
}

let connectSearch='';
function buildConnect(){
  const wrap=el('div',{style:{display:'flex',flexDirection:'column',flex:'1',overflow:'hidden'}});
  const head=el('div',{style:{padding:'22px 20px 0',flexShrink:'0'}});
  head.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;"><div><p style="font-size:22px;font-weight:900;color:var(--gray-800);margin-bottom:2px;">People for you</p><p style="font-size:13px;color:var(--gray-500);">Matched by shared interests</p></div><svg width="26" height="26" viewBox="0 0 24 24" fill="none">${ICONS.heart.replace(/COLOR/g,'var(--pink)')}</svg></div>`;
  const sRow=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',background:'var(--gray-100)',borderRadius:'14px',padding:'11px 14px',margin:'14px 0'}});
  sRow.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none">${ICONS.search.replace(/COLOR/g,'var(--gray-400)')}</svg>`;
  const sInp=el('input',{type:'text',placeholder:'Search by name or interest…',value:connectSearch,style:{flex:'1',background:'none',border:'none',outline:'none',fontSize:'14px',fontFamily:'Nunito',color:'var(--gray-800)'}});
  const resultsDiv=el('div');
  sInp.oninput=e=>{connectSearch=e.target.value;buildConnect_results(resultsDiv);};
  sRow.appendChild(sInp);head.appendChild(sRow);wrap.appendChild(head);
  const scroll=el('div',{className:'scroll',style:{padding:'0 20px 100px'}});
  buildConnect_results(resultsDiv);scroll.appendChild(resultsDiv);
  wrap.appendChild(scroll);return wrap;
}

function buildConnect_results(container){
  container.innerHTML='';
  const scored=PEOPLE.map(p=>{const shared=p.interests.filter(i=>STATE.user.interests.includes(i));return{...p,shared,score:shared.length};})
    .filter(p=>{const q=connectSearch.toLowerCase();return(q===''||p.name.toLowerCase().includes(q)||p.interests.some(i=>i.toLowerCase().includes(q)))&&p.score>0;})
    .sort((a,b)=>b.score-a.score);
  if(scored.length===0){container.innerHTML=`<div class="empty-state"><p style="font-size:36px;margin-bottom:10px;">🔍</p><p style="font-size:15px;font-weight:800;color:var(--gray-600);margin-bottom:4px;">No matches yet</p></div>`;return;}
  scored.forEach(p=>{
    const isConn=STATE.connected.includes(p.id);
    const card=el('div',{className:'card',style:{marginBottom:'12px'}});
    const topRow=el('div',{style:{display:'flex',gap:'12px',alignItems:'flex-start'}});
    const avDiv=el('div',{style:{cursor:'pointer',flexShrink:'0'},onClick:()=>{STATE.viewProfile=p;render();}});
    avDiv.innerHTML=mkAvatar(p.name,50,'');topRow.appendChild(avDiv);
    const info=el('div',{style:{flex:'1',minWidth:'0'}});
    const nameRow=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'2px'}});
    const nameEl=el('p',{style:{fontWeight:'900',fontSize:'15px',color:'var(--gray-800)',cursor:'pointer'},onClick:()=>{STATE.viewProfile=p;render();}});
    nameEl.textContent=p.name;nameRow.appendChild(nameEl);
    if(p.score>0){const badge=el('span',{style:{background:'#FEF3C7',color:'#D97706',fontSize:'10px',fontWeight:'800',padding:'2px 8px',borderRadius:'20px'}});badge.textContent=`${p.score} shared`;nameRow.appendChild(badge);}
    info.appendChild(nameRow);
    const sub=el('p',{style:{fontSize:'12px',color:'var(--gray-400)',marginBottom:'6px'}});sub.textContent=`${p.course} · ${p.year}`;info.appendChild(sub);
    const bio=el('p',{style:{fontSize:'12.5px',color:'var(--gray-600)',marginBottom:'8px',fontStyle:'italic'}});bio.textContent=`"${p.bio}"`;info.appendChild(bio);
    const tags=el('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
    p.interests.forEach(i=>{const t=el('span',{className:'tag sm'+(STATE.user.interests.includes(i)?' active':'')});t.textContent=i;tags.appendChild(t);});
    info.appendChild(tags);topRow.appendChild(info);card.appendChild(topRow);
    const actRow=el('div',{style:{display:'flex',gap:'8px',marginTop:'12px'}});
    const connBtn=el('button',{className:'btn-sm'+(isConn?' joined':''),style:{flex:'1'},onClick:()=>{if(isConn){STATE.connected=STATE.connected.filter(x=>x!==p.id);}else{STATE.connected.push(p.id);}render();}});
    connBtn.textContent=isConn?'Connected ✓':'Connect';
    const msgBtn=el('button',{className:'btn-sm outline',style:{flex:'1',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'},onClick:()=>{STATE.chatTarget=p;if(!STATE.dmList.find(x=>x.id===p.id))STATE.dmList.unshift(p);render();}});
    msgBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none">${ICONS.msg.replace(/COLOR/g,'var(--purple)')}</svg> Message`;
    actRow.appendChild(connBtn);actRow.appendChild(msgBtn);card.appendChild(actRow);container.appendChild(card);
  });
}

function buildMessages(){
  const wrap=el('div',{style:{display:'flex',flexDirection:'column',flex:'1',overflow:'hidden'}});
  const head=el('div',{style:{padding:'22px 20px 0',flexShrink:'0'}});
  head.innerHTML=`<p style="font-size:22px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">Messages</p><p style="font-size:13px;color:var(--gray-500);margin-bottom:18px;">Circles & connections</p>`;
  wrap.appendChild(head);
  const scroll=el('div',{className:'scroll',style:{padding:'0 20px 100px'}});
  const joined=CIRCLES.filter(c=>STATE.joinedCircles.includes(c.id));
  if(joined.length>0){
    const t=el('p',{className:'section-title',style:{marginBottom:'10px'}});t.textContent='My Circles';scroll.appendChild(t);

let chatTab=0;
function getOrInitChat(id,isGroup,target){
  if(!STATE.messages[id]){
    if(isGroup){
      const seed=GROUP_SEEDS[id]||[];
      STATE.messages[id]=[
        {id:'sys1',isSystem:true,text:`Welcome to ${target.n}! 🎉 Let's make great memories together ✨`},
        ...seed.map((s,i)=>({id:'seed'+i,sender:s.sender,text:s.text,time:s.time})),
      ];
    } else {
      const shared=(target.interests||[]).filter(i=>STATE.user.interests.includes(i));
      const greetText=shared.length>0?`Hey ${STATE.user.firstName}! Saw we both love ${shared[0]} 😊 So happy to connect!`:`Hey ${STATE.user.firstName}!! So nice to meet you here 💜`;
      STATE.messages[id]=[
        {id:'sys-ice',isSystem:true,text:'✨ AI is crafting a personalized icebreaker...'},
        {id:'init',sender:target.name,text:greetText,time:nowTime()}
      ];
      (async()=>{
        try{
          const icebreaker=await getAIIcebreaker(target);
          const msgs=STATE.messages[id];
          const sysMsg=msgs.find(m=>m.id==='sys-ice');
          if(sysMsg)sysMsg.text='💡 AI Icebreaker suggestion: "'+icebreaker+'"';
          if(STATE.chatTarget?.id===id)render();
        }catch(e){
          const msgs=STATE.messages[id];
          const sysMsg=msgs.find(m=>m.id==='sys-ice');
          if(sysMsg)sysMsg.text='💡 Try asking about their interests to break the ice!';
          if(STATE.chatTarget?.id===id)render();
        }
      })();
    }
  }
  return STATE.messages[id];
}

function syncRealMessages(){
  try{

}

    useNameBtn.textContent=`Join as ${STATE.user.name} →`;nameSetup.appendChild(useNameBtn);wrap.appendChild(nameSetup);return wrap;
  }
  const msgArea=el('div',{style:{flex:'1',overflowY:'auto',padding:'14px 16px 8px',display:'flex',flexDirection:'column',gap:'10px'}});
  msgArea.id='real-msg-area';
  const banner=el('div',{className:'bubble-system',style:{margin:'0 0 8px'}});
  banner.innerHTML=`🔴 <strong>Live Campus Chat</strong> — Messages are shared across devices via browser storage. Refresh to see new messages from other visitors!`;
  msgArea.appendChild(banner);
  STATE.realMessages.forEach(m=>{
    const isMe=m.sender===STATE.realName;
    const row=el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end',justifyContent:isMe?'flex-end':'flex-start'}});
    if(!isMe){row.innerHTML=mkAvatar(m.sender,30);}
    const inner=el('div',{style:{maxWidth:'240px'}});
    if(!isMe){const nm=el('p',{style:{fontSize:'11px',fontWeight:'800',color:'var(--purple)',marginBottom:'3px'}});nm.textContent=m.sender;inner.appendChild(nm);}
    const bub=el('div',{className:isMe?'bubble-mine':'bubble-other'});bub.textContent=m.text;inner.appendChild(bub);
    const ts=el('p',{style:{fontSize:'10px',color:'var(--gray-400)',textAlign:isMe?'right':'left',marginTop:'2px'}});ts.textContent=m.time+(isMe?' ✓✓':'');
    inner.appendChild(ts);row.appendChild(inner);msgArea.appendChild(row);
  });
  wrap.appendChild(msgArea);
  setTimeout(()=>{const a=document.getElementById('real-msg-area');if(a)a.scrollTop=a.scrollHeight;},60);
  const inputBar=el('div',{style:{padding:'10px 14px calc(16px + var(--safe-bottom))',borderTop:'1.5px solid var(--gray-100)',display:'flex',gap:'8px',alignItems:'center',flexShrink:'0',background:'white'}});
  const inputWrap=el('div',{style:{flex:'1',background:'var(--gray-100)',borderRadius:'24px',display:'flex',alignItems:'center',padding:'9px 14px',gap:'8px'}});
  const inp=el('input',{type:'text',placeholder:'Say something to the campus...',style:{flex:'1',background:'none',border:'none',outline:'none',fontSize:'14px',fontFamily:'Nunito',color:'var(--gray-800)'}});
  function sendReal(){
    const v=inp.value.trim();if(!v)return;
    const msg={id:Date.now(),sender:STATE.realName,text:v,time:nowTime(),isMe:true};
    STATE.realMessages.push(msg);inp.value='';saveRealMessages();render();
    if(Math.random()<0.3){
      const aiPeople=['Riya Sharma','Karan Mehta','Ananya Joshi','Dev Anand','Ishita Verma'];
      const aiSender=aiPeople[Math.floor(Math.random()*aiPeople.length)];
      const aiPerson=PEOPLE.find(p=>p.name===aiSender)||PEOPLE[0];
      setTimeout(async()=>{
        try{const reply=await getAIPersonReply(aiPerson,[],v);const aiMsg={id:Date.now()+1,sender:aiSender,text:reply,time:nowTime(),isMe:false};STATE.realMessages.push(aiMsg);saveRealMessages();if(STATE.showRealChat)render();}catch(e){}
      },1200+Math.random()*2000);
    }
  }
  inp.onkeydown=e=>{if(e.key==='Enter')sendReal();};
  inputWrap.appendChild(inp);
  const sendBtn=el('button',{style:{width:'42px',height:'42px',borderRadius:'50%',background:'var(--purple)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(124,58,237,.4)',flexShrink:'0'},onClick:sendReal});
  sendBtn.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none">${ICONS.send.replace(/COLOR/g,'white')}</svg>`;
  inputBar.appendChild(inputWrap);inputBar.appendChild(sendBtn);
  const refreshBar=el('div',{style:{padding:'4px 14px 0',display:'flex',justifyContent:'center',flexShrink:'0'}});
  const refreshBtn=el('button',{style:{background:'none',border:'none',fontSize:'11px',color:'var(--purple)',fontWeight:'700',cursor:'pointer',fontFamily:'Nunito'},onClick:()=>{syncRealMessages();render();}});
  refreshBtn.textContent='↻ Refresh to see messages from others';
  refreshBar.appendChild(refreshBtn);
  wrap.insertBefore(refreshBar,inputBar);
  wrap.appendChild(inputBar);return wrap;
}

  slideCounter.textContent=`${STATE.communitySlide+1} / ${COMMUNITY_SLIDES.length}`;

  const nextBtn=el('button',{className:'carousel-arrow',onClick:()=>{if(STATE.communitySlide<COMMUNITY_SLIDES.length-1){STATE.communitySlide++;render();}}});
  nextBtn.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if(STATE.communitySlide===COMMUNITY_SLIDES.length-1)nextBtn.setAttribute('disabled','');

  navRow.appendChild(prevBtn);navRow.appendChild(slideCounter);navRow.appendChild(nextBtn);
  slideDiv.appendChild(navRow);

  scrollArea.appendChild(slideDiv);
  wrap.appendChild(scrollArea);
  return wrap;
}

// WATCH A MOVIE SCREEN

function buildWatchMovieScreen(){

  const badge=el('div',{style:{background:'rgba(220,38,38,.85)',color:'white',fontSize:'10px',fontWeight:'900',padding:'5px 12px',borderRadius:'20px',letterSpacing:'.8px',animation:'gamePulse 2s infinite'}});
  badge.textContent='● NEW';

  wrap.appendChild(hdr);

  const scrollArea=el('div',{className:'scroll',style:{background:'#06040d'}});
  const body=el('div',{style:{padding:'0 22px 60px'}});

  const posterWrap=el('div',{className:'movie-poster-wrap'});
  const poster=el('img',{src:MOVIE_POSTER,alt:'Fear of Participation movie poster',className:'movie-poster'});
  poster.onerror=()=>{
    poster.style.display='none';
    const placeholder=el('div',{style:{width:'100%',maxWidth:'280px',height:'380px',background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:'20px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'12px'}});

    posterWrap.appendChild(placeholder);
  };
  posterWrap.appendChild(poster);
  body.appendChild(posterWrap);

  body.innerHTML+=`
    <div style="text-align:center;margin-bottom:20px;">
      <h1 style="font-size:26px;font-weight:900;color:white;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2;">Fear of Participation</h1>
      <p style="font-size:13px;color:rgba(220,38,38,.85);font-weight:800;line-height:1.5;max-width:280px;margin:0 auto;">Silence isn't choice. Sometimes, it's FEAR. &amp; SOCIAL HIERARCHY.</p>
    </div>
  `;

  const genreRow=el('div',{style:{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap',marginBottom:'20px'}});
  [{l:'🎭 Drama',c:'rgba(239,68,68,.75)',b:'rgba(239,68,68,.3)'},{l:'🎓 Campus Life',c:'rgba(168,85,247,.75)',b:'rgba(168,85,247,.3)'},{l:'💔 Social Anxiety',c:'rgba(251,146,60,.75)',b:'rgba(251,146,60,.3)'}].forEach(g=>{
    const t=el('span',{style:{fontSize:'11px',fontWeight:'800',padding:'4px 12px',borderRadius:'20px',border:`1px solid ${g.b}`,background:'rgba(0,0,0,.3)',color:g.c,letterSpacing:'.4px'}});
    t.textContent=g.l;genreRow.appendChild(t);
  });
  body.appendChild(genreRow);

  const synopsis=el('div',{style:{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'18px',padding:'16px 18px',marginBottom:'24px'}});
  synopsis.innerHTML=`<p style="font-size:11px;font-weight:800;color:rgba(220,38,38,.7);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;">Synopsis</p><p style="font-size:14px;color:rgba(255,255,255,.75);font-weight:600;line-height:1.65;">A powerful drama exploring the invisible barriers of social circles. Silence isn't choice. A story about courage and breaking the cycle of being silent.</p>`;
  body.appendChild(synopsis);

  const stats=el('div',{style:{display:'flex',gap:'10px',marginBottom:'28px'}});
  [['🎬','Drama'],['🏫','Campus'],['⭐','New'],['🆓','Free']].forEach(([icon,label])=>{
    const s=el('div',{style:{flex:'1',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'14px',padding:'10px 6px',textAlign:'center'}});
    s.innerHTML=`<p style="font-size:20px;margin-bottom:3px;">${icon}</p><p style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.4px;">${label}</p>`;
    stats.appendChild(s);
  });
  body.appendChild(stats);

  const watchBtn=el('button',{className:'watch-now-btn',onClick:()=>{/* Intentionally inactive — coming soon */}});
  watchBtn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg> Watch Now`;
  body.appendChild(watchBtn);

  body.innerHTML+=`<p style="text-align:center;font-size:11px;color:rgba(255,255,255,.25);font-weight:600;margin-top:10px;">🎬 Coming soon to CU Circle streaming · Campus exclusive screening</p>`;

  scrollArea.appendChild(body);
  wrap.appendChild(scrollArea);
  return wrap;
}

render();
